<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #eee; padding: 50px; }
    .game { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px #ccc; }
    button { font-size: 16px; margin: 5px; padding: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="game">
    <h1>Rock Paper Scissors</h1>
    <button onclick="play('rock')">Rock</button>
    <button onclick="play('paper')">Paper</button>
    <button onclick="play('scissors')">Scissors</button>
    <h3 id="result"></h3>
    <h3>Score: <span id="score">0</span></h3>
  </div>
  <script>
    let score = 0;
    function play(player) {
      let choices = ['rock', 'paper', 'scissors'];
      let comp = choices[Math.floor(Math.random() * 3)];
      let res = '';
      if (player === comp) res = `Tie! Both chose ${player}`;
      else if ((player=='rock' && comp=='scissors') || (player=='paper' && comp=='rock') || (player=='scissors' && comp=='paper')) {
        res = `You win! ${player} beats ${comp}`;
        score++;
      } else {
        res = `You lose! ${comp} beats ${player}`;
        score = Math.max(0, score - 1);
      }
      document.getElementById('result').innerText = res;
      document.getElementById('score').innerText = score;
    }
  </script>
</body>
</html>
