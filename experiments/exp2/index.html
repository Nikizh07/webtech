<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <header>
            <h1>Rock Paper Scissors</h1>
            <p class="subtitle">First to 5 points wins the match!</p>
        </header>

        <section class="scoreboard">
            <div class="score-card player">
                <h3>You</h3>
                <span id="playerScore" class="score">0</span>
            </div>
            <div class="score-card computer">
                <h3>Computer</h3>
                <span id="computerScore" class="score">0</span>
            </div>
        </section>

        <section class="controls">
            <button class="choice-btn" data-choice="rock">✊ Rock</button>
            <button class="choice-btn" data-choice="paper">✋ Paper</button>
            <button class="choice-btn" data-choice="scissors">✌️ Scissors</button>
        </section>

        <div class="results">
            <h2 id="roundResult">Make your move!</h2>
            <p id="matchResult" class="hidden"></p>
            <button id="resetBtn" class="hidden">Play Again</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
