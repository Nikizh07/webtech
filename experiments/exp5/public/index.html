<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Task Manager</h1>
            <p>Keep track of your daily activities</p>
        </header>

        <section class="task-input-section">
            <form id="taskForm">
                <input type="text" id="taskInput" placeholder="What needs to be done?" required autocomplete="off">
                <button type="submit" id="addTaskBtn">Add Task</button>
            </form>
            <div id="errorMessage" class="error-msg hidden"></div>
        </section>

        <section class="tasks-section">
            <div class="task-stats">
                <span id="totalTasks">Total: 0</span>
            </div>
            <ul id="taskList" class="task-list">
                <!-- Tasks will be injected here -->
            </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
