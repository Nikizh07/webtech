<!DOCTYPE html>
<html>
<head>
  <title>Simple Chatbot</title>
  <style>
    body { font-family: sans-serif; background: #eef; text-align: center; padding: 30px; }
    .chat-box { width: 400px; margin: auto; background: white; border: 1px solid #ccc; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px #ddd; }
    .messages { height: 300px; overflow-y: auto; text-align: left; border-bottom: 1px solid #ddd; margin-bottom: 10px; padding: 5px; }
    input { width: 70%; padding: 10px; }
    button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
    p { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="chat-box">
    <h2>Chatbot</h2>
    <div class="messages" id="messages"></div>
    <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">Send</button>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    
    socket.on('receiveMessage', (data) => {
      const msgDiv = document.getElementById('messages');
      const p = document.createElement('p');
      p.innerHTML = `<strong>${data.sender}:</strong> ${data.text}`;
      msgDiv.appendChild(p);
      msgDiv.scrollTop = msgDiv.scrollHeight;
    });

    function send() {
      const input = document.getElementById('msgInput');
      if (input.value.trim() !== '') {
        socket.emit('sendMessage', input.value);
        input.value = '';
      }
    }
  </script>
</body>
</html>
