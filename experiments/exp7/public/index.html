<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>Support Bot <span id="statusIndicator" class="status offline"></span></h2>
            <p>We typically reply in seconds</p>
        </header>

        <main class="chat-main" id="messagesContainer">
            <div class="message system">
                <p>Welcome to Support! Connecting you to the server...</p>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chatForm">
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                <button type="submit" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>
  
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
